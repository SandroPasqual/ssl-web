<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My SSL Dashboard — Spread Some Love</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--surface:#111118;--border:#1E1E2E;--red:#E94560;--green:#4CAF6E;--white:#F0EEE9;--muted:#5A5A72;--mono:'DM Mono',monospace;--serif:'Fraunces',Georgia,serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--white);font-family:var(--mono);font-size:14px;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:40px 40px}
nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.nav-logo span{color:var(--red)}
.nav-back{font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:2px}
.nav-back:hover{color:var(--white)}
h1{font-family:var(--serif);font-size:40px;font-weight:300;color:var(--white);margin-bottom:8px}
h1 em{color:var(--red);font-style:italic}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:40px}
.tabs{display:flex;gap:4px;margin-bottom:32px}
.tab{padding:8px 20px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.tab.active{background:var(--red);color:white;border-color:var(--red)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:32px}
.stat-item{background:var(--surface);padding:28px 24px}
.stat-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:var(--serif);font-size:40px;font-weight:300;color:var(--white);line-height:1}
.stat-value.red{color:var(--red)}
.stat-value.green{color:var(--green)}
.stat-note{font-size:10px;color:#333348;margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.panel{background:var(--surface);border:1px solid var(--border);padding:24px}
.panel-title{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}
.platform-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.platform-row:last-child{border-bottom:none}
.platform-name{font-size:12px;color:var(--white);width:80px}
.bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 12px}
.bar{height:4px;background:var(--red);border-radius:2px;transition:width 0.6s ease}
.platform-num{font-size:12px;color:var(--red);font-weight:bold;width:30px;text-align:right}
.variant-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.variant-row:last-child{border-bottom:none}
.variant-text{font-size:12px;color:var(--white);font-style:italic}
.variant-count{font-size:12px;color:var(--muted)}
.timeline{margin-bottom:32px}
.timeline-panel{background:var(--surface);border:1px solid var(--border);padding:24px}
.day-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.day-label{font-size:10px;color:var(--muted);width:60px;text-align:right}
.day-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px}
.day-bar{height:6px;background:var(--red);border-radius:3px;transition:width 0.5s ease}
.day-count{font-size:10px;color:var(--muted);width:20px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .big{font-family:var(--serif);font-size:48px;margin-bottom:12px;color:var(--border)}
.empty-state p{font-size:13px;line-height:1.8}
.global-badge{background:var(--surface);border:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.global-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.global-val{font-family:var(--serif);font-size:32px;font-weight:300;color:var(--green)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;display:inline-block;margin-right:6px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@media(max-width:768px){
  .container{padding:24px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="nav-logo"><span>♥</span> Spread Some Love</div>
    <a href="https://sandropasqual.github.io/ssl-web/" class="nav-back">← Back to site</a>
  </nav>

  <h1>Your <em>utility</em> report.</h1>
  <p class="subtitle">Every signal you generated — by platform, by expression, over time.</p>

  <div class="global-badge">
    <div class="global-label"><span class="dot"></span>Global signals — all users</div>
    <div class="global-val" id="global-count">—</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-range="7">Last 7 days</div>
    <div class="tab" data-range="30">Last 30 days</div>
    <div class="tab" data-range="all">All time</div>
  </div>

  <div id="main-content">
    <div class="empty-state">
      <div class="big">❤️</div>
      <p>Loading your data...</p>
    </div>
  </div>
</div>

<script>
const FB_PROJECT = "spread-some-love";
const FB_KEY = "AIzaSyBx-Jmrnod_bprrio2aFykuzCEuV3PM8UU";
let allSignals = [];
let currentRange = 7;

function filterByRange(signals, days) {
  if (days === "all") return signals;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return signals.filter(s => new Date(s.timestamp) >= cutoff);
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

function render(signals, range) {
  const filtered = filterByRange(signals, range);
  const days = range === "all" ? Math.max(1, Math.ceil((Date.now() - (signals.length ? new Date(signals[0].timestamp) : Date.now())) / 86400000)) : range;

  if (filtered.length === 0) {
    document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="big">♡</div><p>No signals in this period yet.<br>Use any AI chat and type "thank you" — it will appear here.</p></div>';
    return;
  }

  // Counts
  const avg = (filtered.length / days).toFixed(1);
  const platforms = {};
  const variants = {};
  filtered.forEach(s => {
    platforms[s.platform] = (platforms[s.platform] || 0) + 1;
    if (s.variant) variants[s.variant] = (variants[s.variant] || 0) + 1;
  });
  const topPlatform = Object.entries(platforms).sort((a,b)=>b[1]-a[1])[0];
  const maxP = Math.max(...Object.values(platforms), 1);

  // Timeline (last 7 days always shown)
  const dayMap = {};
  const last7 = getLast7Days();
  filtered.forEach(s => {
    const day = s.timestamp.split("T")[0];
    dayMap[day] = (dayMap[day] || 0) + 1;
  });
  const maxDay = Math.max(...last7.map(d => dayMap[d] || 0), 1);

  document.getElementById("main-content").innerHTML = `
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-label">Total Signals</div><div class="stat-value red">${filtered.length}</div><div class="stat-note">in selected period</div></div>
      <div class="stat-item"><div class="stat-label">Daily Average</div><div class="stat-value">${avg}</div><div class="stat-note">signals per day</div></div>
      <div class="stat-item"><div class="stat-label">Top Platform</div><div class="stat-value" style="font-size:24px;padding-top:8px">${topPlatform ? topPlatform[0] : '—'}</div><div class="stat-note">${topPlatform ? topPlatform[1] + ' signals' : ''}</div></div>
      <div class="stat-item"><div class="stat-label">Expressions Used</div><div class="stat-value">${Object.keys(variants).length}</div><div class="stat-note">unique variants</div></div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="panel-title">By Platform</div>
        ${Object.entries(platforms).sort((a,b)=>b[1]-a[1]).map(([p,c]) => `
          <div class="platform-row">
            <div class="platform-name">${p}</div>
            <div class="bar-wrap"><div class="bar" style="width:${c/maxP*100}%"></div></div>
            <div class="platform-num">${c}</div>
          </div>`).join('')}
      </div>
      <div class="panel">
        <div class="panel-title">By Expression</div>
        ${Object.entries(variants).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([v,c]) => `
          <div class="variant-row">
            <div class="variant-text">"${v}"</div>
            <div class="variant-count">${c}×</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="timeline">
      <div class="timeline-panel">
        <div class="panel-title">Last 7 Days</div>
        ${last7.map(day => {
          const count = dayMap[day] || 0;
          const label = new Date(day).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
          return `<div class="day-row">
            <div class="day-label">${label}</div>
            <div class="day-bar-wrap"><div class="day-bar" style="width:${count/maxDay*100}%"></div></div>
            <div class="day-count">${count || ''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// Load from chrome storage if available, otherwise show instructions
if (typeof chrome !== 'undefined' && chrome.storage) {
  chrome.storage.local.get(["signals"], (result) => {
    allSignals = (result.signals || []).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    render(allSignals, currentRange);
  });
} else {
  document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="big">♡</div><p>This dashboard works when opened from<br>the SSL browser extension.<br><br>Click the ❤️ icon in your browser toolbar,<br>then click "Open full dashboard".</p></div>';
}

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const r = tab.dataset.range === "all" ? "all" : parseInt(tab.dataset.range);
    currentRange = r;
    render(allSignals, r);
  });
});

// Global count
async function loadGlobal() {
  try {
    const url = "https://firestore.googleapis.com/v1/projects/"+FB_PROJECT+"/databases/(default)/documents/stats/global?key="+FB_KEY;
    const res = await fetch(url);
    const data = await res.json();
    if (data.fields && data.fields.total) {
      document.getElementById("global-count").textContent = parseInt(data.fields.total.integerValue||0).toLocaleString();
    }
  } catch(e) {}
}
loadGlobal();
</script>
</body>
</html>
